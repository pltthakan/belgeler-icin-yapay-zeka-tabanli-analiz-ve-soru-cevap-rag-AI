spring:
  application:
    name: private-document-rag-worker
  main:
    web-application-type: none
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ragdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        concurrency: ${DOCUMENT_WORKER_CONCURRENCY:1}
        max-concurrency: ${DOCUMENT_WORKER_MAX_CONCURRENCY:2}
        default-requeue-rejected: false

app:
  ai:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:5000}
  rabbitmq:
    document-processing:
      exchange: ${DOCUMENT_PROCESSING_EXCHANGE:document-processing.exchange}
      queue: ${DOCUMENT_PROCESSING_QUEUE:document-processing.queue}
      routing-key: ${DOCUMENT_PROCESSING_ROUTING_KEY:document-processing}
