spring:
  application:
    name: private-document-rag-worker
  main:
    web-application-type: none
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ragdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        concurrency: ${DOCUMENT_WORKER_CONCURRENCY:1}
        max-concurrency: ${DOCUMENT_WORKER_MAX_CONCURRENCY:2}
        default-requeue-rejected: false

app:
  ai:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:5000}
  rabbitmq:
    document-processing:
      exchange: ${DOCUMENT_PROCESSING_EXCHANGE:document-processing.exchange}
      queue: ${DOCUMENT_PROCESSING_QUEUE:document-processing.queue}
      routing-key: ${DOCUMENT_PROCESSING_ROUTING_KEY:document-processing}
      retry-exchange: ${DOCUMENT_PROCESSING_RETRY_EXCHANGE:document-processing.retry.exchange}
      retry-queue: ${DOCUMENT_PROCESSING_RETRY_QUEUE:document-processing.retry.queue}
      retry-routing-key: ${DOCUMENT_PROCESSING_RETRY_ROUTING_KEY:document-processing.retry}
      retry-delay-ms: ${DOCUMENT_PROCESSING_RETRY_DELAY_MS:30000}
      max-retries: ${DOCUMENT_PROCESSING_MAX_RETRIES:3}
      dead-letter-exchange: ${DOCUMENT_PROCESSING_DEAD_LETTER_EXCHANGE:document-processing.dlx}
      dead-letter-queue: ${DOCUMENT_PROCESSING_DEAD_LETTER_QUEUE:document-processing.dlq}
      dead-letter-routing-key: ${DOCUMENT_PROCESSING_DEAD_LETTER_ROUTING_KEY:document-processing.dead}
