services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    container_name: rag-postgres
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rag-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rag
      RABBITMQ_DEFAULT_PASS: rag
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build: ./ai-service
    container_name: rag-ai-service
    environment:
      DATA_DIR: /app/data
      EMBEDDING_MODEL_NAME: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      QA_MODEL_NAME: deepset/xlm-roberta-base-squad2
      DISABLE_QA_MODEL: "false"
      # İsteğe bağlı Ollama entegrasyonu. Ayarlanmadığında extractive QA fallback kullanılır.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-30}
      RAG_MIN_RETRIEVAL_SCORE: ${RAG_MIN_RETRIEVAL_SCORE:-0.10}
      PGVECTOR_DSN: postgresql://postgres:postgres@postgres:5432/ragdb
    ports:
      - "5001:5000"
    volumes:
      - ai_data:/app/data
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build: ./backend
    container_name: rag-backend
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ragdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: rag
      SPRING_RABBITMQ_PASSWORD: rag
      JWT_SECRET: dev-secret-key-change-this-value-minimum-32-chars
      AI_SERVICE_BASE_URL: http://ai-service:5000
      APP_UPLOAD_DIR: /app/uploads
      APP_BOOTSTRAP_ADMIN_EMAIL: ${APP_BOOTSTRAP_ADMIN_EMAIL:-}
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads

  document-worker:
    build: ./document-worker
    container_name: rag-document-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ragdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: rag
      SPRING_RABBITMQ_PASSWORD: rag
      AI_SERVICE_BASE_URL: http://ai-service:5000
      DOCUMENT_WORKER_CONCURRENCY: 1
      DOCUMENT_WORKER_MAX_CONCURRENCY: 2
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: rag-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  rabbitmq_data:
  ai_data:
  hf_cache:
  backend_uploads:
